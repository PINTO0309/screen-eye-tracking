<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="730" viewBox="0 0 1600 730">
  <rect width="1600" height="730" fill="#f6f3ee"/>

  <text x="800" y="68" text-anchor="middle" font-family="Noto Sans, DejaVu Sans, sans-serif" font-size="38" font-weight="700" fill="#05070a">Screen Eye Tracking Framework</text>
  <text x="800" y="112" text-anchor="middle" font-family="Noto Sans, DejaVu Sans, sans-serif" font-size="18" fill="#5f6673">Layered view of application, runtime, execution backend, and hardware components</text>
  <rect x="80" y="146" width="1440" height="4" fill="#111827"/>

  <g font-family="Noto Sans, DejaVu Sans, sans-serif">
    <g>
      <text x="80" y="218" text-anchor="start" font-size="24" font-weight="700" fill="#2f3947">Frontend Layer</text>
      <text x="80" y="245" text-anchor="start" font-size="15" fill="#6b7280">Presentation</text>
      <polygon points="390,170 1520,170 1520,348 780,348 780,248 390,248" fill="#85d9b7"/>
      <text x="1150" y="259" text-anchor="middle" dominant-baseline="middle" font-size="26" font-weight="700" fill="#171923">Electron/React</text>
    </g>

    <g>
      <text x="80" y="318" text-anchor="start" font-size="24" font-weight="700" fill="#2f3947">Application Layer</text>
      <text x="80" y="345" text-anchor="start" font-size="15" fill="#6b7280">Software</text>
      <rect x="390" y="270" width="350" height="78" fill="#f4a6a8"/>
      <text x="565" y="309" text-anchor="middle" dominant-baseline="middle" font-size="26" font-weight="700" fill="#171923">Python</text>
    </g>

    <g>
      <text x="80" y="438" text-anchor="start" font-size="24" font-weight="700" fill="#2f3947">Inference Runtime Layer</text>
      <text x="80" y="465" text-anchor="start" font-size="15" fill="#6b7280">Software</text>
      <rect x="390" y="390" width="350" height="78" fill="#a8b5f8"/>
      <text x="565" y="429" text-anchor="middle" dominant-baseline="middle" font-size="26" font-weight="700" fill="#171923">onnxruntime-gpu</text>
      <rect x="780" y="390" width="350" height="78" fill="#91d8dc"/>
      <text x="955" y="429" text-anchor="middle" dominant-baseline="middle" font-size="26" font-weight="700" fill="#171923">onnxruntime-web</text>
      <rect x="1170" y="390" width="350" height="78" fill="#d5a5ea"/>
      <text x="1345" y="429" text-anchor="middle" dominant-baseline="middle" font-size="26" font-weight="700" fill="#171923">LiteRT.js</text>
    </g>

    <g>
      <text x="80" y="538" text-anchor="start" font-size="24" font-weight="700" fill="#2f3947">Execution Backend Layer</text>
      <text x="80" y="565" text-anchor="start" font-size="15" fill="#6b7280">Software</text>
      <rect x="390" y="490" width="350" height="78" fill="#f3b887"/>
      <text x="565" y="529" text-anchor="middle" dominant-baseline="middle" font-size="22" font-weight="700" fill="#171923">TensorRT/CUDA/CPU</text>
      <rect x="780" y="490" width="740" height="78" fill="#f1c27d"/>
      <text x="1150" y="529" text-anchor="middle" dominant-baseline="middle" font-size="26" font-weight="700" fill="#171923">WebGPU/WASM</text>
    </g>

    <rect x="80" y="598" width="1440" height="3" fill="#c9c2b8"/>

    <g>
      <text x="80" y="678" text-anchor="start" font-size="24" font-weight="700" fill="#2f3947">Hardware Layer</text>
      <text x="80" y="705" text-anchor="start" font-size="15" fill="#6b7280">Hardware</text>
      <rect x="390" y="630" width="545" height="78" fill="#f7c6cf"/>
      <text x="662.5" y="669" text-anchor="middle" dominant-baseline="middle" font-size="26" font-weight="700" fill="#171923">Webcam</text>
      <rect x="975" y="630" width="545" height="78" fill="#82b9df"/>
      <text x="1247.5" y="669" text-anchor="middle" dominant-baseline="middle" font-size="26" font-weight="700" fill="#171923">dGPU/iGPU</text>
    </g>
